{% extends "base_app.html" %}

{% block title %}Study Rooms • StudyLink{% endblock %}

{% block content %}

<!-- Page header -->
<section class="page-header page-header-row">
    <div>
        <h1>Study Rooms</h1>
        <p class="page-date muted" id="studyRoomsDate"></p>
    </div>
    <button class="btn btn-outline" id="openCreateRoomBtn"
            style="background:var(--panel); border-color:var(--border);">
        Create Room
    </button>
</section>

<!-- Create Room inline panel (hidden until button clicked) -->
<div id="createRoomPanel" style="display:none; margin-bottom:20px;">
    <div class="panel" style="max-width: 520px;">
        <h2 style="margin-bottom:16px;">New Study Room</h2>
        <div class="stack">
            <div>
                <label style="font-size:0.85rem; font-weight:500; display:block; margin-bottom:6px;">Room title</label>
                <input id="sessionTitle" placeholder="ex. Finishing HW 3" />
            </div>
            <div>
                <label style="font-size:0.85rem; font-weight:500; display:block; margin-bottom:6px;">Cover image URL <span class="muted" style="font-weight:400;">(optional)</span></label>
                <input id="sessionCoverUrl" placeholder="https://..." />
            </div>
            <div>
                <label style="font-size:0.85rem; font-weight:500; display:block; margin-bottom:6px;">Description <span class="muted" style="font-weight:400;">(optional)</span></label>
                <textarea id="sessionDescription" rows="2"
                          placeholder="What are you studying? Any notes for participants..."
                          style="resize:none; font-size:0.88rem;"></textarea>
            </div>
            <div class="row" style="justify-content:flex-end; gap:10px;">
                <button class="btn btn-secondary"
                        onclick="StudyLink.cancelCreateRoom()">Cancel</button>
                <button class="btn"
                        style="background:var(--card-blue-bg); border:1.5px solid var(--card-blue-border); color:var(--text);"
                        onclick="StudyLink.startSession()">Create Room</button>
            </div>
        </div>
    </div>
</div>

<!-- Room grid -->
<div id="studyRoomsList" class="room-grid"></div>

{% endblock %}


{% block page_scripts %}
<script>
    StudyLink.initStudyRooms();
</script>
{% endblock %}
